name: build-and-test

# Sprint 24 Phase B9 — PR build/lint/typecheck/test (no deploy).
# Replaces the original ci.yml from sprint 0 with a build verification step
# so PR review surfaces broken bundles before they reach main.

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Type check
        run: npm run typecheck
      - name: Test
        run: npm run test
      - name: Build (verify bundle)
        env:
          # Use a placeholder value at PR time — real value is injected by
          # deploy-azure.yml from the GitHub Environment.
          VITE_API_BASE_URL: https://api.example.com
        run: npm run build
