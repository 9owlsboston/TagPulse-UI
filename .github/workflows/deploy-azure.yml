name: deploy-azure

# Sprint 24 Phase B8 — deploy the SPA bundle to the Azure Static Web App
# matching the chosen environment.
#
# Triggers:
#   - push to main             → auto-deploy to dev
#   - tag v*                   → auto-deploy to staging
#   - workflow_dispatch        → manual any env (production gated by
#                                 reviewer rules on the GH Environment)
#   - pull_request to main     → SWA preview deploy (action handles it
#                                 automatically when production_branch=main)
#
# Secrets / variables come from the GitHub Environment configured by
# scripts/ui-cicd-setup.sh:
#   variables: AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID,
#              AZURE_STATIC_WEB_APPS_NAME, VITE_API_BASE_URL
#   secret:    AZURE_STATIC_WEB_APPS_API_TOKEN

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, closed]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        type: choice
        required: true
        default: dev
        options: [dev, staging, production]

permissions:
  contents: read
  pull-requests: write   # for SWA preview comments on PRs (future-proofing)

concurrency:
  group: deploy-azure-${{ github.ref }}-${{ github.event.inputs.environment || (startsWith(github.ref, 'refs/tags/v') && 'staging') || 'dev' }}
  cancel-in-progress: false

jobs:
  # Sprint 27 follow-up — run the full lint/typecheck/test/build matrix as
  # a gating job so a regression on push to main never reaches SWA. Calls
  # build-and-test.yml as a reusable workflow. Skipped on pull_request
  # because that event already triggers build-and-test.yml directly (and
  # the SWA preview slot is its own deploy path below).
  check:
    if: github.event_name != 'pull_request'
    uses: ./.github/workflows/build-and-test.yml

  resolve:
    runs-on: ubuntu-latest
    needs: check
    # PR events use the SWA action's built-in preview environment, not a
    # named GitHub Environment — skip the resolve job in that case.
    if: github.event_name != 'pull_request'
    outputs:
      environment: ${{ steps.pick.outputs.environment }}
    steps:
      - id: pick
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "environment=${{ github.event.inputs.environment }}" >>"$GITHUB_OUTPUT"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "environment=staging" >>"$GITHUB_OUTPUT"
          else
            echo "environment=dev" >>"$GITHUB_OUTPUT"
          fi

  preview:
    # PR preview deploy. The SWA action provisions/decommissions a preview
    # slot automatically based on the PR event type; we just hand it the
    # built bundle. Bound to the `dev` GitHub Environment so it can read
    # the deploy-token secret that scripts/ui-cicd-setup.sh dev uploads.
    # Until that script has been run for the first time, the secret is
    # empty and the action skips gracefully via skip_deploy_on_missing_secrets.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Build (preview)
        env:
          # Previews target the dev api so the SPA is exercisable end-to-end.
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_APP_INSIGHTS_CONNECTION_STRING: ${{ vars.VITE_APP_INSIGHTS_CONNECTION_STRING }}
          VITE_BUILD_VERSION: ${{ github.sha }}
        # Skip the build on PR-close events; the action only needs to know
        # the PR is closing so it can tear the preview slot down.
        if: github.event.action != 'closed'
        run: npm run build
      - name: Deploy preview
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: ${{ github.event.action == 'closed' && 'close' || 'upload' }}
          app_location: "dist"
          api_location: ""
          output_location: ""
          skip_app_build: true
          skip_deploy_on_missing_secrets: true
          production_branch: main

  deploy:
    needs: resolve
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: ${{ needs.resolve.outputs.environment }}
      url: https://${{ steps.swa-host.outputs.hostname }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_APP_INSIGHTS_CONNECTION_STRING: ${{ vars.VITE_APP_INSIGHTS_CONNECTION_STRING }}
          VITE_BUILD_VERSION: ${{ github.sha }}
        run: npm run build

      # Sprint 25 B3 — Fail the deploy if the api the SPA was built against
      # is unhealthy. Catches wrong VITE_API_BASE_URL or a down backend
      # before we ship a broken SPA. Skipped on pull_request events.
      - name: API preflight check
        if: github.event_name != 'pull_request'
        env:
          API_BASE: ${{ vars.VITE_API_BASE_URL }}
        run: |
          set -euo pipefail
          if [[ -z "${API_BASE:-}" ]]; then
            echo "::warning::VITE_API_BASE_URL is empty — skipping api preflight"
            exit 0
          fi
          echo "Preflight: checking ${API_BASE}/health/ready"
          code=$(curl -fsS --max-time 10 -o /tmp/health.json -w '%{http_code}' "${API_BASE}/health/ready" 2>&1 || true)
          if [[ "$code" != "200" ]]; then
            echo "::error::API preflight failed — ${API_BASE}/health/ready returned HTTP ${code}"
            cat /tmp/health.json 2>/dev/null || true
            exit 1
          fi
          echo "✓ API preflight passed (HTTP 200)"
          cat /tmp/health.json

      - name: Deploy to Azure Static Web Apps
        id: swa-deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: "dist"
          api_location: ""
          output_location: ""
          skip_app_build: true
          production_branch: main

      - name: Resolve SWA hostname
        id: swa-host
        env:
          # Sourced from the GitHub Environment variable seeded by
          # scripts/ui-cicd-setup.sh, which itself reads the Bicep output
          # `staticWebAppHostname` from the backend azd env. This is the
          # real <random>.azurestaticapps.net hostname (production slot).
          SWA_HOST: ${{ vars.AZURE_STATIC_WEB_APPS_HOSTNAME }}
        run: |
          set -euo pipefail
          if [[ -z "${SWA_HOST:-}" ]]; then
            # Fallback to the action's output for repos that wired CI/CD
            # before AZURE_STATIC_WEB_APPS_HOSTNAME was added.
            SWA_HOST="${{ steps.swa-deploy.outputs.static_web_app_url }}"
            SWA_HOST="${SWA_HOST#https://}"
            SWA_HOST="${SWA_HOST#http://}"
            SWA_HOST="${SWA_HOST%/}"
          fi
          if [[ -z "$SWA_HOST" ]]; then
            echo "::error::no AZURE_STATIC_WEB_APPS_HOSTNAME variable and deploy step emitted no static_web_app_url" >&2
            exit 1
          fi
          echo "hostname=$SWA_HOST" >>"$GITHUB_OUTPUT"
          echo "resolved hostname: $SWA_HOST"

      - name: Smoke test (HTTP 200 + asset hash present)
        if: ${{ needs.resolve.outputs.environment != 'production' }}
        run: |
          set -euo pipefail
          host="${{ steps.swa-host.outputs.hostname }}"
          # Pull the main JS asset hash from the locally-built index.html so
          # we can confirm the deployed origin is serving THIS build.
          asset=$(grep -oE 'assets/[A-Za-z0-9_-]+\.js' dist/index.html | head -1 || true)
          echo "Smoke testing https://$host (asset: ${asset:-<none>})"
          # Retry up to 6 * 10s = 60s for SWA edge propagation.
          for i in 1 2 3 4 5 6; do
            code=$(curl -sS -o /tmp/index.html -w '%{http_code}' "https://$host/" || true)
            if [[ "$code" == "200" ]]; then
              if [[ -z "$asset" ]] || grep -q "$asset" /tmp/index.html; then
                echo "✓ smoke test passed (HTTP 200, asset matched)"
                break
              fi
            fi
            echo "  attempt $i: HTTP $code, retrying in 10s..."
            sleep 10
          done

      # Sprint 25 B4 — Post-deploy SPA-vs-api consistency check.
      # Verifies the SPA-embedded api URL responds and the SWA hostname
      # is in the api's CORS allow-list (prevents silent CORS failures).
      - name: SPA-vs-API consistency check
        if: ${{ needs.resolve.outputs.environment != 'production' }}
        env:
          API_BASE: ${{ vars.VITE_API_BASE_URL }}
          SWA_HOST: ${{ steps.swa-host.outputs.hostname }}
        run: |
          set -euo pipefail
          if [[ -z "${API_BASE:-}" ]]; then
            echo "::warning::VITE_API_BASE_URL is empty — skipping SPA-vs-API check"
            exit 0
          fi
          echo "SPA-vs-API check: ${API_BASE}/health/ready"
          code=$(curl -fsS --max-time 10 -o /tmp/api-health.json -w '%{http_code}' "${API_BASE}/health/ready" 2>&1 || true)
          if [[ "$code" != "200" ]]; then
            echo "::error::Post-deploy API check failed — ${API_BASE}/health/ready returned HTTP ${code}"
            exit 1
          fi
          echo "✓ API is healthy (HTTP 200)"
          # CORS preflight: check that the SWA origin is allowed
          origin="https://${SWA_HOST}"
          cors_code=$(curl -sS -o /dev/null -w '%{http_code}' \
            -X OPTIONS \
            -H "Origin: ${origin}" \
            -H "Access-Control-Request-Method: GET" \
            "${API_BASE}/health/live" || true)
          if [[ "$cors_code" == "200" ]] || [[ "$cors_code" == "204" ]]; then
            echo "✓ CORS preflight passed for ${origin}"
          else
            echo "::warning::CORS preflight returned HTTP ${cors_code} for origin ${origin} — the SPA may hit CORS errors"
          fi
