worker_processes auto;
pid /tmp/nginx.pid;
events { worker_connections 1024; }

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    gzip on;
    gzip_types text/css application/javascript application/json;

    server {
        listen 80;
        root /usr/share/nginx/html;
        index index.html;

        # UI health check
        location = /health-ui {
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }

        # SPA fallback — all UI routes serve index.html
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Proxy API calls to backend service
        location /auth            { proxy_pass http://api:8000; }
        location /tag-reads       { proxy_pass http://api:8000; }
        location /device-registry { proxy_pass http://api:8000; }
        location /device-health   { proxy_pass http://api:8000; }
        location /rules           { proxy_pass http://api:8000; }
        location /alerts          { proxy_pass http://api:8000; }
        location /integrations    { proxy_pass http://api:8000; }
        location /analytics       { proxy_pass http://api:8000; }
        location /admin           { proxy_pass http://api:8000; }
        location /users           { proxy_pass http://api:8000; }
        location /telemetry-models { proxy_pass http://api:8000; }
        location /telemetry       { proxy_pass http://api:8000; }
        location /health          { proxy_pass http://api:8000; }
        location /openapi.json    { proxy_pass http://api:8000; }
        location /docs            { proxy_pass http://api:8000; }

        # Sprint 58: newer backend prefixes. Trailing slash on overlap-prone
        # paths (e.g. /dashboard, /assets) so the SPA route at the bare path
        # still serves index.html while API sub-paths proxy to the backend.
        location /dashboard/        { proxy_pass http://api:8000; }
        location /assets/           { proxy_pass http://api:8000; }
        location /tags              { proxy_pass http://api:8000; }
        location /tag-transfers     { proxy_pass http://api:8000; }
        location /tag-data-mappings { proxy_pass http://api:8000; }
        location /tag-collisions    { proxy_pass http://api:8000; }
        location /tenant            { proxy_pass http://api:8000; }
        location /branding          { proxy_pass http://api:8000; }
        location /sites             { proxy_pass http://api:8000; }
        location /zones             { proxy_pass http://api:8000; }
        location /products          { proxy_pass http://api:8000; }
        location /lots              { proxy_pass http://api:8000; }
        location /stock-items       { proxy_pass http://api:8000; }
        location /stock-movements   { proxy_pass http://api:8000; }
        location /stock-levels      { proxy_pass http://api:8000; }
        location /categories        { proxy_pass http://api:8000; }
        location /labels            { proxy_pass http://api:8000; }
        location /rule-templates    { proxy_pass http://api:8000; }
        location /bulk-operations   { proxy_pass http://api:8000; }
        location /audit-logs        { proxy_pass http://api:8000; }
        location /dead-letter       { proxy_pass http://api:8000; }
        location /map-config        { proxy_pass http://api:8000; }
        location /provisioning      { proxy_pass http://api:8000; }
        location /security          { proxy_pass http://api:8000; }

        # SSE — disable buffering for streaming
        location /integrations/stream {
            proxy_pass http://api:8000;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
        }
    }
}
